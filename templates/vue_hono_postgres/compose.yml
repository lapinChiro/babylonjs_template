services:
  # PostgreSQL Database
  postgres:
    image: postgres:17.6
    container_name: postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      # 名前付きボリュームに変更（バインドマウントから移行）
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./
      dockerfile: ./docker/Dockerfile.frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - /workspace/apps/frontend/node_modules
    environment:
      - NODE_ENV=development
      # API設定
      - VITE_API_BASE_URL=http://localhost:3000/api
      - VITE_API_TIMEOUT=120000
      # アプリケーション設定
      - VITE_APP_VERSION=0.0.0
      - VITE_ENVIRONMENT=development
      - VITE_ENABLE_DEBUG=true
      # パフォーマンス最適化設定
      - VITE_ENABLE_PREFETCH=true
      - VITE_ENABLE_PRELOAD=false
      - VITE_CHUNK_SIZE_LIMIT=500
    networks:
      - app_network

  backend:
    build:
      context: ./
      dockerfile: ./docker/Dockerfile.backend
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/workspace/apps/backend
      - /workspace/apps/backend/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SERVER_TIMEOUT=120000
      # PostgreSQL settings
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=dev
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_SSL=false
      # JWT settings
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_EXPIRES_IN=24h
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  app_network:
    driver: bridge

volumes:
  postgres-data:
