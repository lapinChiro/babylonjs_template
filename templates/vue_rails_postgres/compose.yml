services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: rails8_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rails8_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Rails Backend
  backend:
    build:
      context: ./
      dockerfile: ./docker/Dockerfile.backend
    container_name: rails8_backend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/rails/backend:delegated
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=dev
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_SSL=false
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_EXPIRES_IN=86400
      # MinIO settings (開発環境用)
      - MINIO_ENDPOINT=minio
      - MINIO_EXTERNAL_ENDPOINT=localhost
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=rails-uploads
      - HOST=${HOST}
      - BASE_PATH=${BASE_PATH:-}
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - rails8_network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      bash -c "
        bundle exec rails db:prepare &&
        bundle exec rails db:seed &&
        bundle exec rails server -b 0.0.0.0
      "

  # Vue Frontend
  frontend:
    build:
      context: ./
      dockerfile: ./docker/Dockerfile.frontend
    container_name: rails8_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/rails/frontend:delegated
      - /rails/frontend/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_TIMEOUT=120000
      - VITE_APP_VERSION=0.0.0
      - VITE_ENVIRONMENT=development
      - VITE_ENABLE_DEBUG=true
      - VITE_ENABLE_PREFETCH=true
      - VITE_ENABLE_PRELOAD=false
      - VITE_CHUNK_SIZE_LIMIT=500
      - VITE_API_BASE_URL=http://${HOST:-localhost:3000}${BASE_PATH}/api
      - BASE_PATH=${BASE_PATH:-}
      - HOST=${HOST:-/}
    networks:
      - rails8_network

  # MinIO Object Storage
  minio:
    image: quay.io/minio/minio:latest
    container_name: rails8_minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173"
      MINIO_SERVER_URL: "http://localhost:9000"  # presigned URLのベースURL
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - rails8_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO初期化（バケット自動作成）
  minio-init:
    image: minio/mc:latest
    container_name: rails8_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/rails-uploads --ignore-existing;
      mc anonymous set download myminio/rails-uploads;
      exit 0;
      "
    networks:
      - rails8_network

networks:
  rails8_network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
