services:
  frontend:
    image: node:22-alpine
    depends_on:
      - api
    environment:
      - API_URL=http://api:3000
      - NODE_OPTIONS=--max-old-space-size=2048
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    ports:
      - 5173:5173
    tty: true
    working_dir: /app
    command: sh -c "npm install && npm run dev"
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      - postgres
    environment:
      CARGO_TARGET_DIR: /tmp/target
      RUST_BACKTRACE: 1
      RUST_TEST_THREADS: 1
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      PGHOST: postgres
      PGUSER: user
      PGPASSWORD: pass
      PGDATABASE: web
      MAX_CONNECTIONS: 10
      ACQUIRE_TIMEOUT: 300
      IDLE_TIMEOUT: 600
    volumes:
      - ./apps/backend:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/tmp/target
    tty: true
    working_dir: /app
    ports:
      - 3000:3000
    security_opt:
      - seccomp:unconfined
    command: bacon --headless --job run-long
    
  postgres:
    image: postgres:17.5
    environment:
      - POSTGRES_DB=web
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    working_dir: /db
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/db
      - ./db/bin/apply_sql.sh:/docker-entrypoint-initdb.d/apply_sql.sh

volumes:
  postgres_data:
  cargo_cache:
  target_cache: