services:
  frontend:
    image: node:24.0.1
    depends_on:
      - api
    environment:
      - API_URL=http://api:3000
    volumes:
      - ./apps/frontend:/app
    ports:
      - 5173:5173
    tty: true
    working_dir: /app
    command: /bin/bash -c "npm install && npm run dev"
  api:
    build: 
      context: .
      dockerfile: ./development/Dockerfile.api
    depends_on:
      - postgres
    environment:
      CARGO_TARGET_DIR: /tmp/target
      RUST_BACKTRACE: 1
      RUST_TEST_THREADS: 1
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      PGHOST: postgres
      PGUSER: user
      PGPASSWORD: pass
      PGDATABASE: web
      MAX_CONNECTIONS: 10
      ACQUIRE_TIMEOUT: 300
      IDLE_TIMEOUT: 600
      LOGIN_CLIENT_ID: ${LOGIN_CLIENT_ID:-xxx}
      LOGIN_CLIENT_SECRET: ${LOGIN_CLIENT_SECRET:-xxx}
      LOGIN_CALLBACK_URL: ${LOGIN_CALLBACK_URL:-http://localhost:5173/oauth}
    volumes:
      - ./apps/services:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/tmp/target
    tty: true
    working_dir: /app
    ports:
      - 3000:3000
    security_opt:
      - seccomp:unconfined
    command: /bin/bash -c "bacon run-long"

  postgres:
    image: postgres:17.5
    environment:
      - POSTGRES_DB=web
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    working_dir: /db
    ports:
      - 5435:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db:/db

volumes:
  postgres_data:
  cargo_cache:
  target_cache: