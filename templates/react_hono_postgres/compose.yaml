services:
  app:
    image: oven/bun:1
    working_dir: /app
    environment:
      - HOST=${HOST}
      - BASE_PATH=${BASE_PATH:-}
      - VITE_SERVER_URL=http://${HOST:-localhost:3000}${BASE_PATH}/api
      - VITE_BETTER_AUTH_URL=http://${HOST:-localhost:3000}${BASE_PATH}/api/auth
      - BETTER_AUTH_URL=http://${HOST:-localhost:3000}${BASE_PATH}/api/auth
      - CORS_ORIGIN=http://${HOST:-localhost:5173}
      - MINIO_ENDPOINT=minio
      - MINIO_EXTERNAL_ENDPOINT=localhost
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=item-images
      - MINIO_UPLOAD_URL_EXPIRY=600
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/client/node_modules
      - /app/packages/server/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    command: sh -c "bun install && bun dev"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=hackathon
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
      - MINIO_API_CORS_ALLOW_ORIGIN=http://localhost:5173
      - MINIO_SERVER_URL=http://localhost:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio-cors.json:/tmp/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      if ! mc ls myminio/item-images > /dev/null 2>&1; then
        mc mb myminio/item-images;
        echo 'Bucket created';
      else
        echo 'Bucket already exists';
      fi;
      echo 'Setting bucket policy to public read/write...';
      mc anonymous set public myminio/item-images;
      echo 'Setting CORS policy...';
      mc cors set /tmp/cors.json myminio/item-images 2>/dev/null || echo 'CORS already set or not supported';
      echo 'Configuration completed';
      exit 0;
      "

volumes:
  db_data:
  minio_data:
