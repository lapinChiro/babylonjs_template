services:
  app:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/client/node_modules
      - /app/packages/server/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    command: sh -c "bun install && bun dev"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=hackathon
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
